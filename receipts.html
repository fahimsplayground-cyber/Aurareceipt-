<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Receipt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #e0e0e0; --accent: #3ecf8e; --border: #333; }
        body.light-mode { --bg: #f0f4f8; --card-bg: #ffffff; --text: #2d3748; --accent: #3182ce; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: var(--card-bg); padding: 15px 0; text-align: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 26px; font-weight: bold; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
        nav { margin-top: 10px; display: flex; justify-content: center; gap: 25px; }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 14px; }
        .theme-toggle { position: absolute; right: 20px; top: 18px; cursor: pointer; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
        .controls { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-top: 30px; margin-bottom: 20px;}
        #receipt-to-snap { width: 380px; background: white; padding: 40px 30px; color: #000; border: 1px solid #e2e8f0; margin-bottom: 50px;}
        .business-name { font-size: 22px; font-weight: 800; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .receipt-label { text-align: center; font-size: 11px; letter-spacing: 2px; margin-bottom: 30px; color: #64748b; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .receipt-table { width: 100%; border-collapse: collapse; font-family: 'Courier Prime', monospace; }
        .receipt-table th { text-align: left; font-size: 12px; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .receipt-table td { padding: 8px 0; font-size: 14px; vertical-align: top; }
        .totals-area { margin-top: 20px; border-top: 1px solid #000; padding-top: 10px; text-align: right; font-family: 'Courier Prime', monospace; }
        .final-total { font-size: 20px; font-weight: 700; margin-top: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; cursor: pointer; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; margin-top: 10px; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; }
        .hidden { display: none !important; }
        .worker-badge { font-size: 12px; background: var(--border); padding: 4px 10px; border-radius: 20px; display: inline-block; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="brand-name">AURAMINT</div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Mode</button>
    <nav>
        <a href="index.html">Home</a>
        <a href="receipts.html">Receipts</a>
        <a href="coupons.html">Coupons</a>
    </nav>
</header>

<div id="main-app" class="hidden">
    <div class="controls">
        <span class="worker-badge" id="logged-in-user">Worker</span>
        <h3 style="margin-top:15px; color:var(--accent)">Create Receipt</h3>
        <input type="text" id="biz-name" placeholder="Business Name" oninput="updateReceipt()">
        <input type="text" id="cust-name" placeholder="Customer Name" oninput="updateReceipt()">
        <div id="items-input-list">
            <div style="display:flex; gap:5px;">
                <input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                <input type="number" placeholder="Price" class="in-price" style="width:80px" oninput="updateReceipt()">
                <input type="number" placeholder="Qty" class="in-qty" style="width:50px" value="1" oninput="updateReceipt()">
            </div>
        </div>
        <button class="btn" style="background:var(--border); color:var(--text); border:1px solid var(--accent);" onclick="addNewInputRow()">+ Add Item</button>
        <div style="margin-top:15px; padding: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border);">
            <label style="font-size: 11px; font-weight: 800; color: var(--accent);">COUPON CODE</label>
            <input type="text" id="in-coupon" placeholder="e.g. SAVE10">
            <button class="btn" style="background:var(--card-bg); border: 1px solid var(--accent); color:var(--text); font-size:12px;" id="verify-btn" onclick="verifyCoupon()">Verify Coupon</button>
            <input type="hidden" id="in-discount" value="0">
        </div>
        <button class="btn btn-save" id="save-btn" onclick="saveAndDownload()">Save & Download</button>
    </div>

    <div id="receipt-to-snap">
        <div class="business-name" id="out-biz">AURAMINT</div>
        <div class="receipt-label">OFFICIAL SALES RECEIPT</div>
        <p style="font-size:11px; margin-bottom:20px; font-family: 'Courier Prime';">
            DATE: <span id="out-date"></span><br>
            CUSTOMER: <span id="out-cust">CASH SALE</span>
        </p>
        <table class="receipt-table">
            <thead><tr><th style="width:60%">ITEM</th><th style="width:10%">QTY</th><th style="text-align:right">TOTAL</th></tr></thead>
            <tbody id="out-items"></tbody>
        </table>
        <div class="totals-area">
            <div>SUBTOTAL: ৳<span id="out-sub">0.00</span></div>
            <div id="coupon-row" class="hidden" style="color: #ef4444;">DISCOUNT (<span id="out-code"></span>): -<span id="out-disc-val">0</span>%</div>
            <div class="final-total">TOTAL: ৳<span id="out-total">0.00</span></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    let currentUser = null;

    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = 'index.html';
        } else {
            currentUser = session.user;
            document.getElementById('logged-in-user').innerText = "Worker: " + currentUser.email;
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('out-date').innerText = new Date().toLocaleString();
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    function addNewInputRow() {
        const div = document.createElement('div');
        div.style.display = "flex"; div.style.gap = "5px";
        div.innerHTML = `<input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                         <input type="number" placeholder="Price" class="in-price" style="width:80px" oninput="updateReceipt()">
                         <input type="number" placeholder="Qty" class="in-qty" style="width:50px" value="1" oninput="updateReceipt()">`;
        document.getElementById('items-input-list').appendChild(div);
    }

    async function verifyCoupon() {
        const code = document.getElementById('in-coupon').value.trim();
        const subtotal = parseFloat(document.getElementById('out-sub').innerText);
        if (!code) return;
        const { data, error } = await _supabase.from('coupons').select('*').eq('code', code).single();
        if (error || !data || !data.is_active || subtotal < data.min_spend) {
            alert("Coupon invalid or conditions not met.");
            document.getElementById('in-discount').value = 0;
        } else {
            document.getElementById('in-discount').value = data.discount_percent;
        }
        updateReceipt();
    }

    function updateReceipt() {
        document.getElementById('out-biz').innerText = document.getElementById('biz-name').value || "AURAMINT";
        document.getElementById('out-cust').innerText = document.getElementById('cust-name').value || "CASH SALE";
        let subtotal = 0, html = '';
        document.querySelectorAll('.in-name').forEach((n, i) => {
            let p = parseFloat(document.querySelectorAll('.in-price')[i].value) || 0;
            let q = parseInt(document.querySelectorAll('.in-qty')[i].value) || 0;
            subtotal += (p * q);
            if(n.value) html += `<tr><td>${n.value}</td><td>${q}</td><td style="text-align:right">৳${(p*q).toFixed(2)}</td></tr>`;
        });
        const disc = parseFloat(document.getElementById('in-discount').value) || 0;
        const final = subtotal * (1 - (disc/100));
        document.getElementById('out-items').innerHTML = html;
        document.getElementById('out-sub').innerText = subtotal.toFixed(2);
        document.getElementById('out-total').innerText = final.toFixed(2);
        if(disc > 0) {
            document.getElementById('coupon-row').classList.remove('hidden');
            document.getElementById('out-code').innerText = document.getElementById('in-coupon').value;
            document.getElementById('out-disc-val').innerText = disc;
        } else { document.getElementById('coupon-row').classList.add('hidden'); }
    }

    async function saveAndDownload() {
        const itemsData = [];
        document.querySelectorAll('.in-name').forEach((n, i) => {
            if(n.value) itemsData.push({ name: n.value, price: document.querySelectorAll('.in-price')[i].value, qty: document.querySelectorAll('.in-qty')[i].value });
        });
        const { data, error } = await _supabase.from('receipts').insert([{
            worker_id: currentUser.id,
            customer_name: document.getElementById('cust-name').value || "Cash Sale",
            items: itemsData,
            subtotal: parseFloat(document.getElementById('out-sub').innerText),
            final_total: parseFloat(document.getElementById('out-total').innerText)
        }]).select();
        if (!error) {
            html2canvas(document.getElementById('receipt-to-snap'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `AURAMINT-${data[0].id.substring(0,5)}.png`;
                link.href = canvas.toDataURL();
                link.click();
                location.reload();
            });
        }
    }
    checkAuth();
</script>
</body>
            </html>
