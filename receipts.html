<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Receipt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --text: #ffffff;
            --sub-text: #888888;
            --accent: linear-gradient(90deg, #3ecf8e, #3182ce);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }
        body.light-mode {
            --bg: #fcfcfc;
            --card: #ffffff;
            --text: #000000;
            --sub-text: #666666;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.02);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .brand-logo { font-size: 20px; font-weight: 900; letter-spacing: 4px; cursor: pointer; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-trigger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 2000; }
        .menu-trigger span { width: 25px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
        .nav-overlay { position: fixed; top: 0; right: -100%; width: 300px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 1500; display: flex; flex-direction: column; padding: 100px 40px; gap: 20px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .nav-overlay.active { right: 0; }
        .nav-overlay a, .nav-overlay button { font-size: 20px; font-weight: 600; text-decoration: none; color: var(--text); background: none; border: none; text-align: left; cursor: pointer; padding: 0; }
        .bento-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .bento-item { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; position: relative; overflow: hidden; transition: 0.3s ease; }
        .controls-box { grid-column: span 5; }
        .preview-box { grid-column: span 7; display: flex; justify-content: center; align-items: flex-start; background: var(--glass); }
        input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); margin-top: 10px; box-sizing: border-box; }
        .pill-btn { background: var(--text); color: var(--bg); border: none; padding: 12px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; width: fit-content; transition: 0.3s; margin-top: 15px; display: inline-block; text-decoration: none; text-align: center; }
        .pill-btn:hover { opacity: 0.8; }
        .worker-badge { font-size: 11px; background: #3ecf8e; color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        #receipt-to-snap { width: 380px; background: white; padding: 40px 30px; color: #000; position: relative; font-family: 'Inter', sans-serif; }
        .business-name { font-size: 22px; font-weight: 800; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .receipt-label { text-align: center; font-size: 11px; letter-spacing: 2px; margin-bottom: 30px; color: #64748b; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .receipt-table { width: 100%; border-collapse: collapse; font-family: 'Courier Prime', monospace; }
        .receipt-table th { text-align: left; font-size: 12px; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .receipt-table td { padding: 8px 0; font-size: 14px; }
        .totals-area { margin-top: 20px; border-top: 1px solid #000; padding-top: 10px; text-align: right; font-family: 'Courier Prime', monospace; }
        .final-total { font-size: 20px; font-weight: 700; margin-top: 5px; }
        .hidden { display: none !important; }
        .auth-screen { height: 80vh; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 900px) { .controls-box, .preview-box { grid-column: span 12; } }
    </style>
</head>
<body>

<header>
    <div class="brand-logo" onclick="location.href='index.html'">AURAMINT</div>
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</header>

<div class="nav-overlay" id="menu-overlay">
    <a href="index.html">Dashboard</a>
    <a href="receipts.html">Receipts</a>
    <a href="coupons.html">Coupons</a>
    <hr style="border:0; border-top:1px solid var(--border); width:100%;">
    <button onclick="toggleTheme()">🌓 Toggle Appearance</button>
    <button onclick="handleLogout()" style="color: #ff4d4d;">🚪 Logout</button>
</div>

<div id="auth-section" class="auth-screen">
    <div style="width: 100%; max-width: 400px; padding: 40px; background: var(--card); border-radius: 30px; border: 1px solid var(--border);">
        <h2 style="margin: 0 0 10px 0;">Worker Sign In</h2>
        <p style="color:var(--sub-text); margin-bottom: 30px;">Authorized Access Only.</p>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="pill-btn" style="width: 100%;" onclick="handleLogin()">Continue</button>
    </div>
</div>

<div id="main-app" class="bento-container hidden">
    <div class="bento-item controls-box">
        <span class="worker-badge" id="logged-in-user">Worker</span>
        <h3 style="margin: 10px 0; font-size: 24px;">Receipt Data</h3>
        <input type="text" id="biz-name" placeholder="Business Name" oninput="updateReceipt()">
        <input type="text" id="cust-name" placeholder="Customer Name" oninput="updateReceipt()">
        <div id="items-input-list" style="margin-top: 10px;">
            <div style="display:flex; gap:5px;">
                <input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                <input type="number" placeholder="Price" class="in-price" style="width:100px" oninput="updateReceipt()">
                <input type="number" placeholder="Qty" class="in-qty" style="width:60px" value="1" oninput="updateReceipt()">
            </div>
        </div>
        <button class="pill-btn" style="background:var(--glass); color:var(--text); border:1px solid var(--border); font-size:12px;" onclick="addNewInputRow()">+ Add Item</button>
        <div style="margin-top:25px; padding: 20px; background: var(--glass); border-radius: 18px; border: 1px solid var(--border);">
            <p style="margin:0 0 10px 0; font-size: 12px; font-weight: 800; color: #3ecf8e;">PROMOTION</p>
            <input type="text" id="in-coupon" placeholder="Coupon Code">
            <button class="pill-btn" id="verify-btn" style="font-size: 11px; padding: 8px 16px;" onclick="verifyCoupon()">Apply</button>
            <input type="hidden" id="in-discount" value="0">
        </div>
        <button class="pill-btn" id="save-btn" style="width: 100%; background: var(--accent); color: white;" onclick="saveAndDownload()">Save & Download PNG</button>
    </div>

    <div class="bento-item preview-box">
        <div id="receipt-to-snap">
            <div class="business-name" id="out-biz">AURAMINT</div>
            <div class="receipt-label">OFFICIAL SALES RECEIPT</div>
            <p style="font-size:11px; margin-bottom:20px; font-family: 'Courier Prime';">
                DATE: <span id="out-date"></span><br>
                CUSTOMER: <span id="out-cust">CASH SALE</span>
            </p>
            <table class="receipt-table">
                <thead><tr><th style="width:60%">ITEM</th><th style="width:10%">QTY</th><th style="text-align:right">TOTAL</th></tr></thead>
                <tbody id="out-items"></tbody>
            </table>
            <div class="totals-area">
                <div>SUBTOTAL: ৳<span id="out-sub">0.00</span></div>
                <div id="coupon-row" class="hidden" style="color: #ef4444;">DISCOUNT (<span id="out-code"></span>): -<span id="out-disc-val">0</span>%</div>
                <div class="final-total">TOTAL: ৳<span id="out-total">0.00</span></div>
            </div>
            <div style="margin-top:40px; text-align:center; font-size:10px; font-family:'Courier Prime'; opacity: 0.6;">
                THANK YOU FOR YOUR BUSINESS!<br>
                GEN-ID: <span id="gen-id" style="text-transform: uppercase;">---</span>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mfWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true } });

    let currentUser = null;
    document.getElementById('out-date').innerText = new Date().toLocaleString();

    async function checkUser() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { currentUser = session.user; showApp(); }
    }

    async function handleLogin() {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
        });
        if (error) alert(error.message);
        else { currentUser = data.user; showApp(); }
    }

    function showApp() {
        document.getElementById('logged-in-user').innerText = "Worker: " + currentUser.email;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
    }

    async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }

    function addNewInputRow() {
        const div = document.createElement('div');
        div.style.display = "flex"; div.style.gap = "5px";
        div.innerHTML = `<input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                         <input type="number" placeholder="Price" class="in-price" style="width:100px" oninput="updateReceipt()">
                         <input type="number" placeholder="Qty" class="in-qty" style="width:60px" value="1" oninput="updateReceipt()">`;
        document.getElementById('items-input-list').appendChild(div);
    }

    // --- FIXED VERIFY FUNCTION ---
    async function verifyCoupon() {
        const code = document.getElementById('in-coupon').value.trim();
        const subtotal = parseFloat(document.getElementById('out-sub').innerText);
        const verifyBtn = document.getElementById('verify-btn');
        if (!code) return;
        
        verifyBtn.innerText = "Checking...";
        
        // Use .ilike for case-insensitivity and remove .single() to avoid crash on empty results
        const { data, error } = await supabaseClient
            .from('coupons')
            .select('*')
            .ilike('code', code);

        if (error) {
            console.error("Supabase Error:", error);
            alert("Connection error. Check console.");
            verifyBtn.innerText = "Apply";
            return;
        }

        const coupon = data[0]; // Get first match

        if (!coupon) { 
            alert("❌ Coupon not found."); 
            resetCoupon(); 
        }
        else if (!coupon.is_active) { 
            alert("🚫 Disabled."); 
            resetCoupon(); 
        }
        else if (subtotal < coupon.min_spend) { 
            alert(`💰 Min spend ৳${coupon.min_spend}`); 
            resetCoupon(); 
        }
        else { 
            document.getElementById('in-discount').value = coupon.discount_percent; 
            updateReceipt(); 
            alert(`✅ Success! ${coupon.discount_percent}% off`);
        }
        verifyBtn.innerText = "Apply";
    }

    function resetCoupon() { document.getElementById('in-discount').value = 0; updateReceipt(); }

    function updateReceipt() {
        document.getElementById('out-biz').innerText = document.getElementById('biz-name').value || "AURAMINT";
        document.getElementById('out-cust').innerText = document.getElementById('cust-name').value || "CASH SALE";
        let subtotal = 0;
        let html = '';
        document.querySelectorAll('.in-name').forEach((n, i) => {
            let p = parseFloat(document.querySelectorAll('.in-price')[i].value) || 0;
            let q = parseInt(document.querySelectorAll('.in-qty')[i].value) || 0;
            subtotal += (p * q);
            if(n.value) html += `<tr><td>${n.value}</td><td>${q}</td><td style="text-align:right">৳${(p*q).toFixed(2)}</td></tr>`;
        });
        const disc = parseFloat(document.getElementById('in-discount').value) || 0;
        const final = subtotal * (1 - (disc/100));
        document.getElementById('out-items').innerHTML = html;
        document.getElementById('out-sub').innerText = subtotal.toFixed(2);
        document.getElementById('out-total').innerText = final.toFixed(2);
        if(disc > 0) {
            document.getElementById('coupon-row').classList.remove('hidden');
            document.getElementById('out-code').innerText = document.getElementById('in-coupon').value;
            document.getElementById('out-disc-val').innerText = disc;
        } else { document.getElementById('coupon-row').classList.add('hidden'); }
    }

    async function saveAndDownload() {
        const saveBtn = document.getElementById('save-btn');
        const couponCode = document.getElementById('in-coupon').value.trim();
        saveBtn.disabled = true; saveBtn.innerText = "Processing...";
        const itemsData = [];
        document.querySelectorAll('.in-name').forEach((n, i) => {
            if(n.value) itemsData.push({ name: n.value, price: document.querySelectorAll('.in-price')[i].value, qty: document.querySelectorAll('.in-qty')[i].value });
        });
        const { data, error } = await supabaseClient.from('receipts').insert([{
            worker_id: currentUser.id,
            customer_name: document.getElementById('cust-name').value || "Cash Sale",
            items: itemsData,
            subtotal: parseFloat(document.getElementById('out-sub').innerText),
            coupon_code: couponCode || null,
            discount_percent: parseFloat(document.getElementById('in-discount').value),
            final_total: parseFloat(document.getElementById('out-total').innerText)
        }]).select();
        if (error) { alert("Error: " + error.message); saveBtn.disabled = false; }
        else {
            document.getElementById('gen-id').innerText = data[0].id.substring(0,8);
            html2canvas(document.getElementById('receipt-to-snap'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `AURAMINT-Receipt-${data[0].id.substring(0,8)}.png`;
                link.href = canvas.toDataURL();
                link.click();
                location.reload();
            });
        }
    }

    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('active'); }
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    checkUser();
</script>
</body>
        </html>
