<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="brand-logo" onclick="location.href='index.html'">AURAMINT</div>
        <div class="menu-trigger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="nav-overlay" id="menu-overlay">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <a href="index.html" class="nav-link">Home</a>
        <a href="receipts.html" class="nav-link">Receipts</a>
        <a href="coupons.html" class="nav-link">Coupons</a>
        <a href="logs.html" class="nav-link">Logs</a>
        <a href="profilem.html" class="nav-link">Profile</a>
        <button class="nav-link" onclick="toggleTheme()">Toggle Theme</button>
        <button class="nav-link" onclick="handleLogout()" style="color:var(--red)">Logout</button>
    </div>

    <main class="bento-container" id="auth-section">
        <div class="bento-item" style="grid-column: span 12;">
            <label>Authentication</label>
            <h2 style="margin: 10px 0;">Initialize Session</h2>
            <button class="pill-btn gradient-btn" onclick="handleLogin()">Login with Google</button>
        </div>
    </main>

    <main class="bento-container hidden" id="main-dashboard">
        <div class="bento-item" style="grid-column: span 8;">
            <h1 style="margin:0;">Welcome, <span id="greet-name" style="color:var(--green)">...</span></h1>
            <p style="color:var(--sub-text)">AURAMINT Workstation is active.</p>
        </div>
        <div class="bento-item" style="grid-column: span 4;">
            <label>Quick Action</label>
            <input type="text" id="name-input" placeholder="Update Display Name">
            <button class="pill-btn" id="save-name-btn" onclick="saveName()" style="margin-top:15px; width:100%">Update</button>
        </div>
    </main>

    <script>
        // ... (Keep existing index.html JavaScript here) ...
    </script>
</body>
</html>
