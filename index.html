<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Receipt Generator | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --blue: #2563eb; --dark: #1e293b; --gray: #64748b; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .auth-card { width: 100%; max-width: 400px; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-top: 50px; }
        .controls { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #receipt-to-snap { width: 380px; background: white; padding: 40px 30px; color: #000; border: 1px solid #e2e8f0; position: relative; }
        .business-name { font-size: 22px; font-weight: 800; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .receipt-label { text-align: center; font-size: 11px; letter-spacing: 2px; margin-bottom: 30px; color: var(--gray); border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        .receipt-table { width: 100%; border-collapse: collapse; font-family: 'Courier Prime', monospace; }
        .receipt-table th { text-align: left; font-size: 12px; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .receipt-table td { padding: 8px 0; font-size: 14px; vertical-align: top; }
        .totals-area { margin-top: 20px; border-top: 1px solid #000; padding-top: 10px; text-align: right; font-family: 'Courier Prime', monospace; }
        .final-total { font-size: 20px; font-weight: 700; margin-top: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; cursor: pointer; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; margin-top: 10px; transition: 0.2s; }
        .btn-save { background: var(--blue); color: white; }
        .btn-verify { background: #f0fdf4; color: var(--success); border: 1px solid var(--success); font-size: 12px; padding: 8px; margin-top: -5px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        .worker-badge { font-size: 12px; background: #e2e8f0; padding: 4px 10px; border-radius: 20px; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div id="auth-section" class="auth-card">
    <h2>Worker Login</h2>
    <input type="email" id="login-email" placeholder="Email Address">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="btn btn-save" onclick="handleLogin()">Sign In</button>
</div>

<div id="main-app" class="hidden">
    <div class="controls">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="worker-badge" id="logged-in-user">Worker</span>
            <button onclick="location.reload()" style="font-size: 11px; border: none; background: none; color: red; cursor: pointer;">Logout</button>
        </div>
        <h3 style="margin-top:0">Create Receipt</h3>
        <input type="text" id="biz-name" placeholder="Business Name" oninput="updateReceipt()">
        <input type="text" id="cust-name" placeholder="Customer Name" oninput="updateReceipt()">
        
        <div id="items-input-list">
            <div style="display:flex; gap:5px;">
                <input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                <input type="number" placeholder="Price" class="in-price" style="width:80px" oninput="updateReceipt()">
                <input type="number" placeholder="Qty" class="in-qty" style="width:50px" value="1" oninput="updateReceipt()">
            </div>
        </div>
        
        <button class="btn" style="background:#f8fafc; border:1px solid #ccc;" onclick="addNewInputRow()">+ Add Item</button>
        
        <div style="margin-top:15px; padding: 10px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
            <label style="font-size: 11px; font-weight: 800; color: var(--gray);">COUPON CODE</label>
            <input type="text" id="in-coupon" placeholder="e.g. SAVE10" style="margin-bottom: 8px;">
            <button class="btn btn-verify" id="verify-btn" onclick="verifyCoupon()">Verify Coupon</button>
            <input type="hidden" id="in-discount" value="0">
        </div>
        
        <button class="btn btn-save" id="save-btn" onclick="saveAndDownload()">Save & Download Image</button>
    </div>

    <div id="receipt-to-snap">
        <div class="business-name" id="out-biz">MY BUSINESS</div>
        <div class="receipt-label">OFFICIAL SALES RECEIPT</div>
        <p style="font-size:11px; margin-bottom:20px; font-family: 'Courier Prime';">
            DATE: <span id="out-date"></span><br>
            CUSTOMER: <span id="out-cust">CASH SALE</span>
        </p>
        <table class="receipt-table">
            <thead><tr><th style="width:60%">ITEM</th><th style="width:10%">QTY</th><th style="text-align:right">TOTAL</th></tr></thead>
            <tbody id="out-items"></tbody>
        </table>
        <div class="totals-area">
            <div>SUBTOTAL: ৳<span id="out-sub">0.00</span></div>
            <div id="coupon-row" class="hidden" style="color: #ef4444;">DISCOUNT (<span id="out-code"></span>): -<span id="out-disc-val">0</span>%</div>
            <div class="final-total">TOTAL: ৳<span id="out-total">0.00</span></div>
        </div>
        <div style="margin-top:40px; text-align:center; font-size:10px; font-family:'Courier Prime';">
            THANK YOU FOR YOUR BUSINESS!<br>
            GEN-ID: <span id="gen-id" style="text-transform: uppercase;">---</span>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    document.getElementById('out-date').innerText = new Date().toLocaleString();

    async function handleLogin() {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
        });
        if (error) alert(error.message);
        else {
            currentUser = data.user;
            document.getElementById('logged-in-user').innerText = "Worker: " + currentUser.email;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
    }

    function addNewInputRow() {
        const div = document.createElement('div');
        div.style.display = "flex"; div.style.gap = "5px";
        div.innerHTML = `<input type="text" placeholder="Item" class="in-name" oninput="updateReceipt()">
                         <input type="number" placeholder="Price" class="in-price" style="width:80px" oninput="updateReceipt()">
                         <input type="number" placeholder="Qty" class="in-qty" style="width:50px" value="1" oninput="updateReceipt()">`;
        document.getElementById('items-input-list').appendChild(div);
    }

    async function verifyCoupon() {
        const code = document.getElementById('in-coupon').value.trim();
        const subtotal = parseFloat(document.getElementById('out-sub').innerText);
        const verifyBtn = document.getElementById('verify-btn');
        
        if (!code) return;
        verifyBtn.innerText = "Checking...";

        const { data, error } = await supabaseClient.from('coupons').select('*').eq('code', code).single();

        if (error || !data) {
            alert("❌ Coupon not found.");
            resetCoupon();
        } else if (!data.is_active) {
            alert("🚫 This coupon is disabled.");
            resetCoupon();
        } else if (data.times_used >= data.usage_limit) {
            alert("⚠️ Coupon usage limit reached.");
            resetCoupon();
        } else if (data.expiry_date && new Date(data.expiry_date) < new Date()) {
            alert("⏰ This coupon has expired.");
            resetCoupon();
        } else if (subtotal < data.min_spend) {
            alert(`💰 Minimum spend for this coupon is ৳${data.min_spend}`);
            resetCoupon();
        } else {
            document.getElementById('in-discount').value = data.discount_percent;
            alert(`✅ Applied: ${data.discount_percent}% off!`);
            updateReceipt();
        }
        verifyBtn.innerText = "Verify Coupon";
    }

    function resetCoupon() {
        document.getElementById('in-discount').value = 0;
        updateReceipt();
    }

    function updateReceipt() {
        document.getElementById('out-biz').innerText = document.getElementById('biz-name').value || "MY BUSINESS";
        document.getElementById('out-cust').innerText = document.getElementById('cust-name').value || "CASH SALE";
        
        let subtotal = 0;
        let html = '';
        document.querySelectorAll('.in-name').forEach((n, i) => {
            let p = parseFloat(document.querySelectorAll('.in-price')[i].value) || 0;
            let q = parseInt(document.querySelectorAll('.in-qty')[i].value) || 0;
            subtotal += (p * q);
            if(n.value) html += `<tr><td>${n.value}</td><td>${q}</td><td style="text-align:right">৳${(p*q).toFixed(2)}</td></tr>`;
        });

        const disc = parseFloat(document.getElementById('in-discount').value) || 0;
        const final = subtotal * (1 - (disc/100));
        document.getElementById('out-items').innerHTML = html;
        document.getElementById('out-sub').innerText = subtotal.toFixed(2);
        document.getElementById('out-total').innerText = final.toFixed(2);
        
        if(disc > 0) {
            document.getElementById('coupon-row').classList.remove('hidden');
            document.getElementById('out-code').innerText = document.getElementById('in-coupon').value;
            document.getElementById('out-disc-val').innerText = disc;
        } else {
            document.getElementById('coupon-row').classList.add('hidden');
        }
    }

    async function saveAndDownload() {
        const saveBtn = document.getElementById('save-btn');
        const couponCode = document.getElementById('in-coupon').value.trim();
        saveBtn.disabled = true;
        saveBtn.innerText = "Processing...";

        const itemsData = [];
        document.querySelectorAll('.in-name').forEach((n, i) => {
            if(n.value) itemsData.push({ 
                name: n.value, 
                price: document.querySelectorAll('.in-price')[i].value, 
                qty: document.querySelectorAll('.in-qty')[i].value 
            });
        });

        const { data, error } = await supabaseClient.from('receipts').insert([{
            worker_id: currentUser.id,
            customer_name: document.getElementById('cust-name').value || "Cash Sale",
            items: itemsData,
            subtotal: parseFloat(document.getElementById('out-sub').innerText),
            coupon_code: couponCode || null,
            discount_percent: parseFloat(document.getElementById('in-discount').value),
            final_total: parseFloat(document.getElementById('out-total').innerText)
        }]).select();

        if (error) {
            alert("Error: " + error.message);
            saveBtn.disabled = false;
        } else {
            // IF COUPON USED, UPDATE THE USAGE COUNT IN DB
            if (couponCode && parseFloat(document.getElementById('in-discount').value) > 0) {
                await supabaseClient.rpc('increment_coupon_usage', { coupon_code: couponCode });
            }

            document.getElementById('gen-id').innerText = data[0].id.substring(0,8);
            html2canvas(document.getElementById('receipt-to-snap'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Receipt-${data[0].id.substring(0,8)}.png`;
                link.href = canvas.toDataURL();
                link.click();
                location.reload();
            });
        }
    }
</script>
</body>
</html>
