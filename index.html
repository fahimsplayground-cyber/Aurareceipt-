<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --text: #ffffff;
            --sub-text: #888888;
            --accent: linear-gradient(90deg, #3ecf8e, #3182ce);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body.light-mode {
            --bg: #fcfcfc;
            --card: #ffffff;
            --text: #000000;
            --sub-text: #666666;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.02);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* --- HEADER & MENU --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
        }

        .brand-logo { 
            font-size: 20px; font-weight: 900; letter-spacing: 4px; cursor: pointer;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .menu-trigger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 2000; }
        .menu-trigger span { width: 25px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }

        .nav-overlay {
            position: fixed;
            top: 0; right: -100%; width: 300px; height: 100%;
            background: var(--card); border-left: 1px solid var(--border);
            z-index: 1500; display: flex; flex-direction: column;
            padding: 100px 40px; gap: 20px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-overlay.active { right: 0; }
        .nav-overlay a, .nav-overlay button { 
            font-size: 20px; font-weight: 600; text-decoration: none; color: var(--text); 
            background: none; border: none; text-align: left; cursor: pointer; padding: 0;
        }
        .nav-overlay hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }

        /* --- BENTO GRID --- */
        .bento-container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 160px; gap: 20px;
        }

        .bento-item {
            background: var(--card); border: 1px solid var(--border); border-radius: 28px;
            padding: 30px; position: relative; overflow: hidden; text-decoration: none; color: inherit;
            transition: 0.3s ease;
        }
        .bento-item:hover { transform: translateY(-5px); border-color: #3ecf8e; }

        .hero-box { grid-column: span 12; grid-row: span 2; display: flex; flex-direction: column; justify-content: center; background: radial-gradient(circle at top right, rgba(62, 207, 142, 0.1), transparent); }
        .profile-box { grid-column: span 4; grid-row: span 2; }
        .tool-box { grid-column: span 8; grid-row: span 2; display: flex; flex-direction: column; justify-content: space-between; }

        .welcome-title { font-size: 56px; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .sub-text { color: var(--sub-text); font-size: 18px; margin-top: 10px; }
        
        .pill-btn {
            background: var(--text); color: var(--bg); border: none; padding: 12px 28px;
            border-radius: 100px; font-weight: 700; cursor: pointer; width: fit-content; transition: 0.3s;
        }
        .pill-btn:hover { opacity: 0.8; }

        input {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: var(--text); margin-top: 20px;
        }

        .hidden { display: none !important; }
        .auth-screen { height: 80vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="brand-logo" onclick="location.href='index.html'">AURAMINT</div>
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</header>

<div class="nav-overlay" id="menu-overlay">
    <a href="index.html">Dashboard</a>
    <a href="receipts.html">Receipts</a>
    <a href="coupons.html">Coupons</a>
    <hr>
    <button onclick="toggleTheme()">🌓 Toggle Appearance</button>
    <button onclick="handleLogout()" style="color: #ff4d4d;">🚪 Logout</button>
</div>

<div id="auth-section" class="auth-screen">
    <div style="width: 100%; max-width: 400px; padding: 40px; background: var(--card); border-radius: 30px; border: 1px solid var(--border);">
        <h2 style="margin: 0 0 10px 0;">Sign In</h2>
        <p class="sub-text" style="margin-bottom: 30px;">Access your secure workstation.</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="pill-btn" id="login-btn" style="width: 100%; margin-top: 25px;" onclick="handleLogin()">Continue</button>
    </div>
</div>

<div id="main-dashboard" class="bento-container hidden">
    <div class="bento-item hero-box">
        <h1 class="welcome-title">Welcome, <span id="greet-name" style="color: #3ecf8e;">User</span></h1>
        <p class="sub-text">Your workstation is active and synchronized.</p>
    </div>

    <div class="bento-item profile-box">
        <h3 style="margin:0">Profile Settings</h3>
        <p class="sub-text" style="font-size: 14px;">Update your public display name.</p>
        <input type="text" id="name-input" placeholder="Enter Full Name">
        <button class="pill-btn" style="margin-top: 15px; font-size: 12px;" onclick="saveName()">Save Changes</button>
    </div>

    <a href="receipts.html" class="bento-item tool-box">
        <div>
            <h2 style="font-size: 32px; margin: 0;">Sales Receipts</h2>
            <p class="sub-text">Generate and export official business documentation.</p>
        </div>
        <div class="pill-btn">Launch Generator</div>
    </a>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    // NEW ANON KEY APPLIED
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    
    const _supabase = supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true } });

    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            showDashboard(session.user.email);
        }
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const btn = document.getElementById('login-btn');
        
        if(!email || !password) return alert("Please fill in all fields.");
        
        btn.innerText = "Authenticating...";
        btn.disabled = true;

        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            alert(error.message);
            btn.innerText = "Continue";
            btn.disabled = false;
        } else {
            showDashboard(data.user.email);
        }
    }

    function showDashboard(email) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        
        const stored = localStorage.getItem('aura_custom_name');
        document.getElementById('greet-name').innerText = stored || email.split('@')[0];
    }

    async function handleLogout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    function saveName() {
        const val = document.getElementById('name-input').value;
        if(val) {
            localStorage.setItem('aura_custom_name', val);
            location.reload();
        }
    }

    function toggleMenu() {
        document.getElementById('menu-overlay').classList.toggle('active');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    checkUser();
</script>
</body>
</html>
