<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --text: #ffffff;
            --sub-text: #888888;
            --accent: linear-gradient(90deg, #3ecf8e, #3182ce);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body.light-mode {
            --bg: #fcfcfc;
            --card: #ffffff;
            --text: #000000;
            --sub-text: #666666;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.02);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            transition: background 0.5s ease;
        }

        /* --- MODERN HEADER --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo { 
            font-size: 20px; 
            font-weight: 900; 
            letter-spacing: 4px; 
            cursor: pointer; 
            background: var(--accent);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* The Three Lines Menu */
        .menu-trigger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1100;
        }
        .menu-trigger span {
            width: 25px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* --- PERFECT BENTO GRID --- */
        .bento-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 160px;
            gap: 20px;
        }

        .bento-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .bento-item:hover {
            transform: translateY(-5px);
            border-color: rgba(62, 207, 142, 0.5);
            background: var(--glass);
        }

        /* Bento Sizing */
        .hero-box { grid-column: span 8; grid-row: span 2; display: flex; flex-direction: column; justify-content: center; background: radial-gradient(circle at top right, rgba(62, 207, 142, 0.1), transparent); }
        .theme-box { grid-column: span 4; grid-row: span 1; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .profile-box { grid-column: span 4; grid-row: span 1; }
        .tool-large { grid-column: span 6; grid-row: span 2; }

        /* Content Styles */
        .welcome-title { font-size: 48px; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .welcome-title span { background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-text { color: var(--sub-text); font-size: 18px; margin-top: 10px; max-width: 80%; }
        
        .pill-btn {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            width: fit-content;
        }

        input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: var(--text);
            margin-top: 10px;
            box-sizing: border-box;
        }

        /* Overlay Menu */
        .nav-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1050;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .nav-overlay a { font-size: 32px; font-weight: 800; text-decoration: none; color: var(--text); }
    </style>
</head>
<body>

<header>
    <div class="brand-logo" onclick="location.href='index.html'">AURAMINT</div>
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</header>

<div class="nav-overlay" id="menu-overlay">
    <a href="index.html" onclick="toggleMenu()">Home</a>
    <a href="receipts.html" onclick="toggleMenu()">Receipts</a>
    <a href="coupons.html" onclick="toggleMenu()">Coupons</a>
</div>

<div class="bento-container">
    <div class="bento-item hero-box">
        <h1 class="welcome-title">Hello, <span id="greet-name">User</span></h1>
        <p class="sub-text">Welcome back to your workstation. Everything is ready for you.</p>
    </div>

    <div class="bento-item theme-box" onclick="toggleTheme()">
        🌓
    </div>

    <div class="bento-item profile-box">
        <p style="margin:0; font-size: 12px; font-weight: 700; opacity: 0.5;">IDENTITY</p>
        <input type="text" id="name-input" placeholder="Update Display Name">
        <button class="pill-btn" style="padding: 6px 15px; font-size: 11px; margin-top: 10px;" onclick="saveName()">Save</button>
    </div>

    <a href="receipts.html" class="bento-item tool-large">
        <div style="font-size: 40px; margin-bottom: 20px;">📄</div>
        <h2 style="font-size: 28px; margin: 0;">Receipts</h2>
        <p class="sub-text">Generate professional invoices and slips with cloud storage.</p>
        <div class="pill-btn">Open Tool</div>
    </a>

    <a href="coupons.html" class="bento-item tool-large" style="background: radial-gradient(circle at bottom left, rgba(49, 130, 206, 0.1), transparent);">
        <div style="font-size: 40px; margin-bottom: 20px;">🎟️</div>
        <h2 style="font-size: 28px; margin: 0;">Coupons</h2>
        <p class="sub-text">Manage discount codes and active business promotions.</p>
        <div class="pill-btn">Manage</div>
    </a>
</div>

<script>
    // Logic: Split Gmail or use Custom Name
    function initUser() {
        const stored = localStorage.getItem('aura_name');
        const display = document.getElementById('greet-name');
        if (stored) {
            display.innerText = stored;
        } else {
            const email = "user@gmail.com"; // Replace with your login email variable
            display.innerText = email.split('@')[0];
        }
    }

    function saveName() {
        const val = document.getElementById('name-input').value;
        if(val) {
            localStorage.setItem('aura_name', val);
            initUser();
            alert("Name updated!");
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function toggleMenu() {
        const overlay = document.getElementById('menu-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    initUser();
</script>
</body>
</html>
