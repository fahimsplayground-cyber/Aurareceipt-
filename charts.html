<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Finance Intelligence</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0d;
            --text: #ffffff;
            --sub-text: #888888;
            --accent: #3ecf8e;
            --border: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.02);
            --blue: #3182ce;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px;
            overflow-x: hidden;
        }

        /* --- PREMIUM HEADER --- */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 40px auto;
        }

        .view-control {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 4px;
            border-radius: 14px;
            display: flex;
            gap: 4px;
        }

        .view-btn {
            padding: 12px 28px;
            border: none;
            background: none;
            color: var(--sub-text);
            cursor: pointer;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .view-btn.active {
            background: var(--glass);
            color: var(--accent);
            box-shadow: 0 4px 15px rgba(62, 207, 142, 0.1);
            border: 1px solid rgba(62, 207, 142, 0.2);
        }

        .export-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            margin-right: 15px;
        }

        .export-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* --- BENTO GRID --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .bento-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-label { 
            font-size: 11px; 
            color: var(--sub-text); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 600;
        }

        .big-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 38px; 
            font-weight: 800; 
            margin: 10px 0;
        }

        .sub-info { font-size: 12px; color: #444; }
        .halal-badge { color: var(--accent); font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; }

        /* Sizing Spans */
        .span-4 { grid-column: span 4; }
        .span-8 { grid-column: span 8; }
        .span-6 { grid-column: span 6; }
        .tall { grid-row: span 2; }

        canvas { width: 100% !important; max-height: 280px; }

        @media (max-width: 1024px) {
            .span-4, .span-8, .span-6 { grid-column: span 12; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="header-section">
    <div>
        <h1 style="margin:0; font-size: 28px; font-weight: 800;">AURAMINT <span style="font-weight: 200; color: var(--sub-text);">|</span> Analytics</h1>
        <p style="color: var(--sub-text); margin-top: 5px;">30-Day Escrow & Split Intelligence</p>
    </div>
    
    <div style="display: flex; align-items: center;">
        <button class="export-btn" id="pdfBtn" onclick="exportToPDF()">
            EXPORT REPORT
        </button>

        <div class="view-control">
            <button class="view-btn active" id="btn-weekly" onclick="switchView('weekly')">WEEKLY</button>
            <button class="view-btn" id="btn-monthly" onclick="switchView('monthly')">MONTHLY</button>
        </div>
    </div>
</div>

<div class="bento-grid" id="capture-area">
    <div class="bento-card span-4">
        <span class="card-label">Total Volume</span>
        <div class="big-value" id="stat-total">$0.00</div>
        <div class="sub-info">All accounts combined</div>
    </div>

    <div class="bento-card span-4" style="border-top: 2px solid var(--accent);">
        <span class="card-label">Personal Share (1/3)</span>
        <div class="big-value" id="stat-share" style="color: var(--accent);">$0.00</div>
        <div class="sub-info">Automated 3-way split</div>
    </div>

    <div class="bento-card span-4">
        <span class="card-label">Halal Revenue</span>
        <div class="big-value" id="stat-halal">$0.00</div>
        <div class="halal-badge">✓ 30 DAYS MATURED</div>
    </div>

    <div class="bento-card span-8 tall">
        <span class="card-label">Growth & Performance</span>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="bento-card span-4 tall">
        <span class="card-label">Account Share</span>
        <canvas id="pieAccount"></canvas>
    </div>

    <div class="bento-card span-6 tall">
        <span class="card-label">Partner Payout Split</span>
        <div style="height: 100%; display: flex; align-items: center;">
            <canvas id="pieSplit"></canvas>
        </div>
    </div>

    <div class="bento-card span-6 tall">
        <span class="card-label">Daily Momentum</span>
        <canvas id="barChart"></canvas>
    </div>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentMode = 'weekly';
    let charts = {};

    async function init() {
        await fetchData();
        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);
    }

    async function fetchData() {
        const { data, error } = await _supabase
            .from('receipts') // Ensure this matches your table name exactly
            .select('*');

        if (error) {
            console.error("Supabase Error:", error);
            return;
        }
        processFinance(data);
    }

    function processFinance(data) {
        const now = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(now.getDate() - 30);

        let total = 0;
        let halal = 0;
        let accMap = {};
        let dailyMap = {};

        data.forEach(item => {
            const val = parseFloat(item.amount || 0);
            const date = new Date(item.created_at);
            const user = item.user_name || 'Admin';

            // Filter logic for Weekly/Monthly
            const diffDays = (now - date) / (1000 * 60 * 60 * 24);
            const isTarget = (currentMode === 'weekly' && diffDays <= 7) || 
                             (currentMode === 'monthly' && diffDays <= 30);

            if (isTarget) {
                total += val;
                if (date < thirtyDaysAgo) halal += val;

                accMap[user] = (accMap[user] || 0) + val;
                
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                dailyMap[dayName] = (dailyMap[dayName] || 0) + val;
            }
        });

        updateUI(total, halal, accMap, dailyMap);
    }

    function updateUI(total, halal, accMap, dailyMap) {
        document.getElementById('stat-total').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('stat-share').innerText = `$${(total / 3).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('stat-halal').innerText = `$${halal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

        renderCharts(accMap, dailyMap, total);
    }

    function renderCharts(accMap, dailyMap, total) {
        const ctxOptions = { plugins: { legend: { labels: { color: '#888', font: { family: 'Inter' } } } } };

        // 1. Account Pie
        if (charts.acc) charts.acc.destroy();
        charts.acc = new Chart(document.getElementById('pieAccount'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(accMap),
                datasets: [{ data: Object.values(accMap), backgroundColor: ['#3ecf8e', '#3182ce', '#ff4d4d'], borderWidth: 0 }]
            },
            options: { cutout: '75%', ...ctxOptions }
        });

        // 2. Partner Split
        if (charts.split) charts.split.destroy();
        charts.split = new Chart(document.getElementById('pieSplit'), {
            type: 'pie',
            data: {
                labels: ['You', 'Partner 1', 'Partner 2'],
                datasets: [{ data: [total/3, total/3, total/3], backgroundColor: ['#3ecf8e', '#111', '#222'], borderColor: '#333' }]
            },
            options: ctxOptions
        });

        // 3. Line Chart (Placeholder Trend)
        if (charts.line) charts.line.destroy();
        charts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: Object.keys(dailyMap).length ? Object.keys(dailyMap) : ['M','T','W','T','F','S','S'],
                datasets: [{ 
                    label: 'Revenue', 
                    data: Object.values(dailyMap).length ? Object.values(dailyMap) : [10, 25, 15, 40, 35, 50, 45], 
                    borderColor: '#3ecf8e', tension: 0.4, fill: true, backgroundColor: 'rgba(62, 207, 142, 0.05)' 
                }]
            },
            options: { scales: { y: { display: false }, x: { grid: { color: '#111' } } }, ...ctxOptions }
        });
    }

    function switchView(mode) {
        currentMode = mode;
        document.getElementById('btn-weekly').classList.toggle('active', mode === 'weekly');
        document.getElementById('btn-monthly').classList.toggle('active', mode === 'monthly');
        fetchData();
    }

    async function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const pdfBtn = document.getElementById('pdfBtn');
        pdfBtn.innerText = "CAPTURING...";

        const area = document.getElementById('capture-area');
        const canvas = await html2canvas(area, { backgroundColor: '#050505', scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const pdf = new jsPDF('l', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

        pdf.setFillColor(5, 5, 5);
        pdf.rect(0, 0, 300, 300, 'F');
        pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
        pdf.save(`AURAMINT_${currentMode.toUpperCase()}_REPORT.pdf`);
        
        pdfBtn.innerText = "EXPORT REPORT";
    }

    init();
</script>
</body>
  </html>
