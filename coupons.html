<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Coupon Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #e0e0e0; --accent: #3ecf8e; --border: #333; }
        body.light-mode { --bg: #f0f4f8; --card-bg: #ffffff; --text: #2d3748; --accent: #3182ce; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        header { background: var(--card-bg); padding: 15px 0; text-align: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 26px; font-weight: bold; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
        nav { margin-top: 10px; display: flex; justify-content: center; gap: 25px; }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 14px; }
        .theme-toggle { position: absolute; right: 20px; top: 18px; cursor: pointer; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
        .container { max-width: 950px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: var(--accent); margin-bottom: 25px; font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); width: 100%; box-sizing: border-box; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .edit-mode-notice { background: rgba(62, 207, 142, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px dashed var(--accent); color: var(--accent); font-weight: bold; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { color: var(--accent); text-transform: uppercase; font-size: 11px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .active { background: rgba(62, 207, 142, 0.2); color: #3ecf8e; }
        .disabled { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }
        .btn-action { padding: 6px 10px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; margin-right: 4px; background: var(--card-bg); color: var(--text); }
        .btn-edit { border-color: var(--accent); color: var(--accent); }
        .btn-del { border-color: #ff4d4d; color: #ff4d4d; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">AURAMINT</div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Mode</button>
    <nav>
        <a href="index.html">Home</a>
        <a href="receipts.html">Receipts</a>
        <a href="coupons.html">Coupons</a>
    </nav>
</header>

<div id="content" class="container hidden">
    <h1>🎟️ Coupon Manager</h1>
    
    <div id="edit-notice" class="edit-mode-notice">⚠️ Editing Mode Active: Save will update the existing coupon.</div>
    
    <div class="form-grid">
        <div><label>Code</label><input type="text" id="code" placeholder="MINT20"></div>
        <div><label>Discount %</label><input type="number" id="discount" placeholder="20"></div>
        <div><label>Min Spend ৳</label><input type="number" id="min_spend" placeholder="500"></div>
        <div><label>Usage Limit</label><input type="number" id="limit" placeholder="100"></div>
        <input type="hidden" id="editing-id" value="">
    </div>
    <button id="submit-btn" class="main-btn" onclick="handleSubmit()">Save Coupon</button>
    <button id="cancel-btn" class="main-btn hidden" style="background:#555" onclick="cancelEdit()">Cancel Edit</button>

    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Disc.</th>
                <th>Min Spend</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="couponTableBody"></tbody>
    </table>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) window.location.href = 'index.html';
        else { document.getElementById('content').classList.remove('hidden'); loadCoupons(); }
    }

    async function loadCoupons() {
        const { data } = await _supabase.from('coupons').select('*').order('created_at', { ascending: false });
        const body = document.getElementById('couponTableBody');
        body.innerHTML = '';
        data.forEach(c => {
            body.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discount_percent}%</td>
                    <td>৳${c.min_spend}</td>
                    <td><span class="status-badge ${c.is_active ? 'active' : 'disabled'}">${c.is_active ? 'ACTIVE' : 'OFF'}</span></td>
                    <td>
                        <button class="btn-action btn-edit" onclick='startEdit(${JSON.stringify(c)})'>Edit</button>
                        <button class="btn-action" onclick="toggleStatus('${c.id}', ${c.is_active})">${c.is_active ? 'Disable' : 'Enable'}</button>
                        <button class="btn-action btn-del" onclick="deleteCoupon('${c.id}')">Del</button>
                    </td>
                </tr>`;
        });
    }

    // Handles both ADD and UPDATE
    async function handleSubmit() {
        const id = document.getElementById('editing-id').value;
        const payload = {
            code: document.getElementById('code').value.toUpperCase(),
            discount_percent: parseFloat(document.getElementById('discount').value),
            min_spend: parseFloat(document.getElementById('min_spend').value) || 0,
            usage_limit: parseInt(document.getElementById('limit').value) || null
        };

        if (id) {
            await _supabase.from('coupons').update(payload).eq('id', id);
            alert("Coupon Updated!");
        } else {
            payload.is_active = true;
            await _supabase.from('coupons').insert([payload]);
            alert("New Coupon Added!");
        }
        cancelEdit();
        loadCoupons();
    }

    function startEdit(coupon) {
        document.getElementById('editing-id').value = coupon.id;
        document.getElementById('code').value = coupon.code;
        document.getElementById('discount').value = coupon.discount_percent;
        document.getElementById('min_spend').value = coupon.min_spend;
        document.getElementById('limit').value = coupon.usage_limit;
        
        document.getElementById('edit-notice').style.display = 'block';
        document.getElementById('submit-btn').innerText = "Update Existing Coupon";
        document.getElementById('cancel-btn').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        document.getElementById('editing-id').value = "";
        document.getElementById('code').value = "";
        document.getElementById('discount').value = "";
        document.getElementById('min_spend').value = "";
        document.getElementById('limit').value = "";
        document.getElementById('edit-notice').style.display = 'none';
        document.getElementById('submit-btn').innerText = "Save Coupon";
        document.getElementById('cancel-btn').classList.add('hidden');
    }

    async function toggleStatus(id, current) {
        await _supabase.from('coupons').update({ is_active: !current }).eq('id', id);
        loadCoupons();
    }

    async function deleteCoupon(id) {
        if(confirm("Permanently delete this coupon?")) { 
            await _supabase.from('coupons').delete().eq('id', id); 
            loadCoupons(); 
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    checkAuth();
</script>
</body>
    </html>
