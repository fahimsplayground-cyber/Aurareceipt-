<div id="main-content" class="bento-container hidden">
    <div class="bento-item form-box">
        <h3 style="margin: 0 0 5px 0;">Master Coupon Control</h3>
        <p style="color: var(--sub-text); font-size: 13px; margin-bottom: 20px;">Manage all Supabase fields here.</p>
        
        <div id="edit-mode-tag" class="hidden" style="background: #3ecf8e; color: #000; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: 900; margin-bottom: 10px; display: inline-block;">EDITING MODE</div>

        <label>Coupon Code</label>
        <input type="text" id="code" placeholder="MINT20">
        
        <label>Discount Percentage</label>
        <input type="number" id="discount" placeholder="20">

        <label>Usage Limit (Max uses)</label>
        <input type="number" id="usage_limit" placeholder="100" value="1">
        
        <label>Min Spend (৳)</label>
        <input type="number" id="min_spend" placeholder="500" value="0">

        <label>Expiry Date & Time</label>
        <input type="datetime-local" id="expiry_date">
        
        <input type="hidden" id="editing-id">
        
        <button id="submit-btn" class="pill-btn" onclick="handleSubmit()">Save Coupon to Database</button>
        <button id="cancel-btn" class="hidden" style="background: none; border: 1px solid var(--border); color: var(--text); padding: 10px; width:100%; border-radius: 100px; margin-top: 10px; cursor: pointer;" onclick="cancelEdit()">Cancel Edit</button>
    </div>

    <div class="bento-item list-box">
        <h3 style="margin: 0 0 20px 0;">Database Overview</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Info</th>
                        <th>Limits/Used</th>
                        <th>Expires</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="couponTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ... [Previous Supabase Client Setup] ...

    async function loadCoupons() {
        const { data } = await _supabase.from('coupons').select('*').order('created_at', { ascending: false });
        const body = document.getElementById('couponTableBody');
        body.innerHTML = '';
        
        data.forEach(c => {
            const expiry = c.expiry_date ? new Date(c.expiry_date).toLocaleString() : 'Never';
            const isExpired = c.expiry_date && new Date(c.expiry_date) < new Date();
            
            body.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discount_percent}% off<br><small>Min: ৳${c.min_spend}</small></td>
                    <td>${c.times_used || 0} / ${c.usage_limit}</td>
                    <td style="color: ${isExpired ? '#ff4d4d' : 'inherit'}">${expiry}</td>
                    <td><span class="status-pill ${c.is_active && !isExpired ? 'active-status' : 'off-status'}">
                        ${isExpired ? 'EXPIRED' : (c.is_active ? 'ACTIVE' : 'OFF')}
                    </span></td>
                    <td>
                        <button class="action-link" onclick='startEdit(${JSON.stringify(c)})'>Edit</button>
                        <button class="action-link" style="color:#ff4d4d" onclick="deleteCoupon('${c.id}')">Del</button>
                    </td>
                </tr>`;
        });
    }

    async function handleSubmit() {
        const id = document.getElementById('editing-id').value;
        const payload = {
            code: document.getElementById('code').value.toUpperCase(),
            discount_percent: parseFloat(document.getElementById('discount').value),
            min_spend: parseFloat(document.getElementById('min_spend').value),
            usage_limit: parseInt(document.getElementById('usage_limit').value),
            expiry_date: document.getElementById('expiry_date').value || null,
            is_active: true
        };

        if (id) {
            await _supabase.from('coupons').update(payload).eq('id', id);
        } else {
            await _supabase.from('coupons').insert([payload]);
        }
        
        cancelEdit();
        loadCoupons();
    }

    function startEdit(c) {
        document.getElementById('editing-id').value = c.id;
        document.getElementById('code').value = c.code;
        document.getElementById('discount').value = c.discount_percent;
        document.getElementById('min_spend').value = c.min_spend;
        document.getElementById('usage_limit').value = c.usage_limit;
        // Format date for input: YYYY-MM-DDTHH:MM
        if(c.expiry_date) {
            document.getElementById('expiry_date').value = new Date(c.expiry_date).toISOString().slice(0, 16);
        }
        
        document.getElementById('edit-mode-tag').classList.remove('hidden');
        document.getElementById('cancel-btn').classList.remove('hidden');
        document.getElementById('submit-btn').innerText = "Update Database Entry";
    }

    async function deleteCoupon(id) {
        if(confirm("Delete this coupon permanently?")) {
            await _supabase.from('coupons').delete().eq('id', id);
            loadCoupons();
        }
    }
    // ... [Keep helper functions: cancelEdit, toggleTheme, etc.] ...
</script>
