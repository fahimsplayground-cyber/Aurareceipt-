<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Coupon Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --text: #ffffff;
            --sub-text: #888888;
            --accent: linear-gradient(90deg, #3ecf8e, #3182ce);
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }
        body.light-mode {
            --bg: #fcfcfc;
            --card: #ffffff;
            --text: #000000;
            --sub-text: #666666;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.02);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* --- HEADER --- */
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; background: var(--bg); }
        .brand-logo { font-size: 20px; font-weight: 900; letter-spacing: 4px; cursor: pointer; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-trigger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 2000; }
        .menu-trigger span { width: 25px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
        
        /* --- NAV OVERLAY --- */
        .nav-overlay { position: fixed; top: 0; right: -100%; width: 300px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 1500; display: flex; flex-direction: column; padding: 100px 40px; gap: 20px; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .nav-overlay.active { right: 0; }
        .nav-overlay a, .nav-overlay button { font-size: 20px; font-weight: 600; text-decoration: none; color: var(--text); background: none; border: none; text-align: left; cursor: pointer; padding: 0; }

        /* --- BENTO LAYOUT --- */
        .bento-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .bento-item { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; transition: 0.3s ease; }
        
        .form-box { grid-column: span 4; height: fit-content; }
        .list-box { grid-column: span 8; }

        input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: var(--text); margin-top: 10px; box-sizing: border-box; }
        label { font-size: 11px; font-weight: 800; color: #3ecf8e; text-transform: uppercase; display: block; margin-top: 15px; }

        .pill-btn { background: var(--text); color: var(--bg); border: none; padding: 12px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
        .pill-btn:hover { opacity: 0.8; }
        
        /* --- TABLE STYLE --- */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 11px; color: var(--sub-text); text-transform: uppercase; padding: 15px 10px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .active-status { background: rgba(62, 207, 142, 0.2); color: #3ecf8e; }
        .off-status { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }

        .action-link { background: none; border: none; color: var(--text); font-size: 12px; cursor: pointer; margin-right: 10px; text-decoration: underline; opacity: 0.6; }
        .action-link:hover { opacity: 1; }

        .hidden { display: none !important; }
        @media (max-width: 900px) { .form-box, .list-box { grid-column: span 12; } }
    </style>
</head>
<body>

<header>
    <div class="brand-logo" onclick="location.href='index.html'">AURAMINT</div>
    <div class="menu-trigger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</header>

<div class="nav-overlay" id="menu-overlay">
    <a href="index.html">Dashboard</a>
    <a href="receipts.html">Receipts</a>
    <a href="coupons.html">Coupons</a>
    <hr style="border:0; border-top:1px solid var(--border); width:100%;">
    <button onclick="toggleTheme()">🌓 Toggle Appearance</button>
    <button onclick="handleLogout()" style="color: #ff4d4d;">🚪 Logout</button>
</div>

<div id="main-content" class="bento-container hidden">
    <div class="bento-item form-box">
        <h3 style="margin: 0 0 5px 0;">Configure Coupon</h3>
        <p style="color: var(--sub-text); font-size: 13px; margin-bottom: 20px;">Create or edit discounts.</p>
        
        <div id="edit-mode-tag" class="hidden" style="background: #3ecf8e; color: #000; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: 900; margin-bottom: 10px; display: inline-block;">EDITING MODE</div>

        <label>Coupon Code</label>
        <input type="text" id="code" placeholder="MINT20">
        
        <label>Discount Percentage</label>
        <input type="number" id="discount" placeholder="20">
        
        <label>Min Spend (৳)</label>
        <input type="number" id="min_spend" placeholder="500">
        
        <input type="hidden" id="editing-id">
        
        <button id="submit-btn" class="pill-btn" onclick="handleSubmit()">Save Coupon</button>
        <button id="cancel-btn" class="hidden" style="background: none; border: 1px solid var(--border); color: var(--text); padding: 10px; width:100%; border-radius: 100px; margin-top: 10px; cursor: pointer;" onclick="cancelEdit()">Cancel Edit</button>
    </div>

    <div class="bento-item list-box">
        <h3 style="margin: 0 0 20px 0;">Active Promotions</h3>
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Discount</th>
                    <th>Min Spend</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="couponTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function checkAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) window.location.href = 'index.html';
        else { 
            document.getElementById('main-content').classList.remove('hidden'); 
            loadCoupons(); 
        }
    }

    async function loadCoupons() {
        const { data } = await _supabase.from('coupons').select('*').order('created_at', { ascending: false });
        const body = document.getElementById('couponTableBody');
        body.innerHTML = '';
        data.forEach(c => {
            body.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discount_percent}%</td>
                    <td>৳${c.min_spend}</td>
                    <td><span class="status-pill ${c.is_active ? 'active-status' : 'off-status'}">${c.is_active ? 'ACTIVE' : 'DISABLED'}</span></td>
                    <td>
                        <button class="action-link" onclick='startEdit(${JSON.stringify(c)})'>Edit</button>
                        <button class="action-link" onclick="toggleStatus('${c.id}', ${c.is_active})">${c.is_active ? 'Disable' : 'Enable'}</button>
                    </td>
                </tr>`;
        });
    }

    async function handleSubmit() {
        const id = document.getElementById('editing-id').value;
        const btn = document.getElementById('submit-btn');
        const payload = {
            code: document.getElementById('code').value.toUpperCase(),
            discount_percent: parseFloat(document.getElementById('discount').value),
            min_spend: parseFloat(document.getElementById('min_spend').value) || 0
        };

        if(!payload.code || isNaN(payload.discount_percent)) return alert("Please fill code and discount.");
        
        btn.innerText = "Processing...";
        
        if (id) {
            await _supabase.from('coupons').update(payload).eq('id', id);
        } else {
            payload.is_active = true;
            await _supabase.from('coupons').insert([payload]);
        }
        
        cancelEdit();
        loadCoupons();
        btn.innerText = "Save Coupon";
    }

    function startEdit(coupon) {
        document.getElementById('editing-id').value = coupon.id;
        document.getElementById('code').value = coupon.code;
        document.getElementById('discount').value = coupon.discount_percent;
        document.getElementById('min_spend').value = coupon.min_spend;
        
        document.getElementById('edit-mode-tag').classList.remove('hidden');
        document.getElementById('cancel-btn').classList.remove('hidden');
        document.getElementById('submit-btn').innerText = "Update Coupon";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cancelEdit() {
        document.getElementById('editing-id').value = "";
        document.getElementById('code').value = "";
        document.getElementById('discount').value = "";
        document.getElementById('min_spend').value = "";
        document.getElementById('edit-mode-tag').classList.add('hidden');
        document.getElementById('cancel-btn').classList.add('hidden');
        document.getElementById('submit-btn').innerText = "Save Coupon";
    }

    async function toggleStatus(id, current) {
        await _supabase.from('coupons').update({ is_active: !current }).eq('id', id);
        loadCoupons();
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }
    function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('active'); }
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    checkAuth();
</script>
</body>
            </html>
