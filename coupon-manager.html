<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAMINT | Coupon Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- AURAMINT THEME SYSTEM --- */
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
            --accent: #3ecf8e; /* Green */
            --border: #333;
            --input-bg: #2a2a2a;
        }

        body.light-mode {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --accent: #3182ce; /* Blue */
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            transition: 0.3s;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            width: 100%;
            background: var(--card-bg);
            padding: 15px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-name {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        nav {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        nav a:hover { color: var(--accent); }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 18px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
        }

        /* --- CONTENT CONTAINER --- */
        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; font-size: 24px;}
        h3 { color: var(--accent); margin-top: 0; font-size: 18px;}

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 5px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        
        input { 
            padding: 12px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            color: var(--text); 
            width: 100%; 
            box-sizing: border-box; 
            transition: 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .main-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            width: 100%; 
            margin-top: 10px; 
            font-size: 16px;
        }
        .main-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        /* --- TABLE STYLES --- */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: var(--bg); border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--border); }
        th { background: var(--border); color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;}
        
        .status-active { color: #3ecf8e; font-weight: bold; background: rgba(62, 207, 142, 0.1); padding: 4px 8px; border-radius: 4px; }
        .status-off { color: #888; text-decoration: line-through; }
        
        hr { margin: 40px 0; border: 0; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="brand-name">AURAMINT</div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 Mode</button>
    <nav>
        <a href="index.html">Home</a>
        <a href="receipts.html">Receipts</a>
        <a href="coupons.html">Coupons</a>
    </nav>
</header>

<div class="container">
    <h1>🎟️ Coupon Manager</h1>
    
    <h3>Create New Coupon</h3>
    <div class="form-grid">
        <div class="input-group">
            <label>Coupon Code</label>
            <input type="text" id="code" placeholder="e.g. MINT50">
        </div>
        <div class="input-group">
            <label>Discount (%)</label>
            <input type="number" id="discount_percent" placeholder="e.g. 20">
        </div>
        <div class="input-group">
            <label>Usage Limit</label>
            <input type="number" id="usage_limit" placeholder="Empty = Unlimited">
        </div>
        <div class="input-group">
            <label>Min Spend (৳)</label>
            <input type="number" id="min_spend" placeholder="0">
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>Expiry Date</label>
            <input type="datetime-local" id="expiry_date">
        </div>
    </div>
    <button class="main-btn" onclick="addCoupon()">Save to Database</button>

    <hr>

    <h3>Active Promotions</h3>
    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Discount</th>
                <th>Used</th>
                <th>Limit</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="couponTableBody">
            <tr><td colspan="6" style="text-align:center;">Loading database...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // --- DATABASE CONFIG ---
    const SUPABASE_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Theme Switcher Logic
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    // 1. Load Coupons
    async function loadCoupons() {
        const { data, error } = await _supabase
            .from('coupons')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);

        const tableBody = document.getElementById('couponTableBody');
        tableBody.innerHTML = ''; 

        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No coupons found.</td></tr>';
            return;
        }

        data.forEach(c => {
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discount_percent}%</td>
                    <td>${c.times_used}</td>
                    <td>${c.usage_limit || '∞'}</td>
                    <td>
                        <span class="${c.is_active ? 'status-active' : 'status-off'}">
                            ${c.is_active ? 'Active' : 'Disabled'}
                        </span>
                    </td>
                    <td><button class="btn-delete" onclick="deleteCoupon('${c.id}')">Delete</button></td>
                </tr>
            `;
        });
    }

    // 2. Add Coupon
    async function addCoupon() {
        const codeInput = document.getElementById('code').value;
        const discountInput = document.getElementById('discount_percent').value;
        
        if(!codeInput || !discountInput) {
            alert("Please fill in Code and Discount.");
            return;
        }

        const payload = {
            code: codeInput.toUpperCase(),
            discount_percent: parseFloat(discountInput),
            usage_limit: document.getElementById('usage_limit').value ? parseInt(document.getElementById('usage_limit').value) : null,
            min_spend: document.getElementById('min_spend').value ? parseFloat(document.getElementById('min_spend').value) : 0,
            expiry_date: document.getElementById('expiry_date').value || null,
            times_used: 0,
            is_active: true
        };

        const { error } = await _supabase.from('coupons').insert([payload]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            // Success reset
            document.getElementById('code').value = '';
            document.getElementById('discount_percent').value = '';
            document.getElementById('usage_limit').value = '';
            document.getElementById('min_spend').value = '';
            document.getElementById('expiry_date').value = '';
            loadCoupons();
        }
    }

    // 3. Delete Coupon
    async function deleteCoupon(id) {
        if(confirm("Permanently delete this coupon?")) {
            await _supabase.from('coupons').delete().eq('id', id);
            loadCoupons();
        }
    }

    loadCoupons();
</script>

</body>
    </html>
