<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; padding: 20px; color: #e0e0e0; }
        .container { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #3ecf8e; border-bottom: 2px solid #3ecf8e; padding-bottom: 10px; margin-bottom: 25px; }
        h3 { color: #3ecf8e; margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; margin-bottom: 5px; color: #888; }
        input { padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #3ecf8e; outline: none; }
        button { background: #3ecf8e; color: #121212; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; margin-top: 10px; }
        button:hover { background: #34b27b; transform: translateY(-1px); }
        .btn-delete { background: #ff4d4d; color: white; padding: 5px 10px; font-size: 12px; width: auto; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #252525; border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #333; }
        th { background: #333; color: #3ecf8e; font-size: 14px; }
        .status-active { color: #3ecf8e; font-weight: bold; }
        .status-off { color: #888; text-decoration: line-through; }
        hr { margin: 40px 0; border: 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎟️ Coupon Manager</h1>
    
    <h3>Create New Coupon</h3>
    <div class="form-grid">
        <div class="input-group">
            <label>Coupon Code</label>
            <input type="text" id="code" placeholder="e.g. SAVE50">
        </div>
        <div class="input-group">
            <label>Discount Percentage (%)</label>
            <input type="number" id="discount_percent" placeholder="e.g. 20">
        </div>
        <div class="input-group">
            <label>Usage Limit (Max uses)</label>
            <input type="number" id="usage_limit" placeholder="Empty = Unlimited">
        </div>
        <div class="input-group">
            <label>Minimum Spend ($)</label>
            <input type="number" id="min_spend" placeholder="0">
        </div>
        <div class="input-group">
            <label>Expiry Date</label>
            <input type="datetime-local" id="expiry_date">
        </div>
    </div>
    <button onclick="addCoupon()">Save to Supabase Database</button>

    <hr>

    <h3>Current Active Coupons</h3>
    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Discount</th>
                <th>Used</th>
                <th>Limit</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="couponTableBody">
            <tr><td colspan="6" style="text-align:center;">Loading coupons...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // --- CONNECTING TO YOUR DATABASE ---
    const SUPABASE_URL = 'https://zadmfqghxtbgimbnguql.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZG1mcWdoeHRiZ2ltYm5ndXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjgwNjUsImV4cCI6MjA4Nzk0NDA2NX0.PbWZgUoRJrnVurm9djTXotfJxBQ-jyGT11i_61F8Cm4';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Function to Load Coupons
    async function loadCoupons() {
        const { data, error } = await _supabase
            .from('coupons')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Database Error:", error);
            return;
        }

        const tableBody = document.getElementById('couponTableBody');
        tableBody.innerHTML = ''; 

        if (data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No coupons found in database.</td></tr>';
            return;
        }

        data.forEach(c => {
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discount_percent}%</td>
                    <td>${c.times_used}</td>
                    <td>${c.usage_limit || '∞'}</td>
                    <td class="${c.is_active ? 'status-active' : 'status-off'}">
                        ${c.is_active ? 'Active' : 'Disabled'}
                    </td>
                    <td><button class="btn-delete" onclick="deleteCoupon('${c.id}')">Delete</button></td>
                </tr>
            `;
        });
    }

    // 2. Function to Add a Coupon
    async function addCoupon() {
        const codeInput = document.getElementById('code').value;
        const discountInput = document.getElementById('discount_percent').value;
        
        if(!codeInput || !discountInput) {
            alert("You must enter a Code and a Discount %");
            return;
        }

        const payload = {
            code: codeInput.toUpperCase(),
            discount_percent: parseFloat(discountInput),
            usage_limit: document.getElementById('usage_limit').value ? parseInt(document.getElementById('usage_limit').value) : null,
            min_spend: document.getElementById('min_spend').value ? parseFloat(document.getElementById('min_spend').value) : 0,
            expiry_date: document.getElementById('expiry_date').value || null,
            times_used: 0,
            is_active: true
        };

        const { error } = await _supabase.from('coupons').insert([payload]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Success! Coupon " + payload.code + " is now live.");
            // Reset form
            document.getElementById('code').value = '';
            document.getElementById('discount_percent').value = '';
            loadCoupons(); // Refresh the list
        }
    }

    // 3. Function to Delete a Coupon
    async function deleteCoupon(id) {
        if(confirm("Are you sure you want to delete this coupon forever?")) {
            const { error } = await _supabase.from('coupons').delete().eq('id', id);
            if (error) alert(error.message);
            loadCoupons();
        }
    }

    // Initial Load when page opens
    loadCoupons();
</script>

</body>
  </html>
